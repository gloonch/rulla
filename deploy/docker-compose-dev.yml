services:
  client:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      VITE_IMAGE_BASE_URL: ""
      NPM_CONFIG_REGISTRY: https://package-mirror.liara.ir/repository/npm/
      NPM_CONFIG_REPLACE_REGISTRY_HOST: always
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    ports:
      - "5173:5173"
    volumes:
      - ../client:/app
      - client_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

  admin:
    image: node:20-alpine
    working_dir: /app
    environment:
      VITE_API_BASE_URL: http://localhost:8080/api/v1
      NPM_CONFIG_REGISTRY: https://package-mirror.liara.ir/repository/npm/
      NPM_CONFIG_REPLACE_REGISTRY_HOST: always
      NPM_CONFIG_AUDIT: "false"
      NPM_CONFIG_FUND: "false"
    ports:
      - "5174:5174"
    volumes:
      - ../admin:/app
      - admin_node_modules:/app/node_modules
    command: sh -c "npm ci && npm run dev"

  db:
    image: postgres:15-alpine
    container_name: rulla-postgres-dev
    env_file: .dev.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data_dev:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\"" ]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ../server
      target: dev
    container_name: rulla-backend-dev
    env_file: .dev.env
    environment:
      GOPROXY: https://package-mirror.liara.ir/repository/go/
      GOSUMDB: "off"
      PROJECT_IMAGES_DIR: /seed/project_images
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"
    volumes:
      - ../server:/app
      - ../client/src/assets/project_images:/seed/project_images:ro
      - ${HOME}/go/pkg/mod:/go/pkg/mod:ro
      - go_build_cache:/root/.cache/go-build

volumes:
  client_node_modules:
  admin_node_modules:
  postgres_data_dev:
  go_build_cache:
